name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Create venv with CPU torch
        # CPU wheels: CI has no GPU and the CUDA-bundled wheels are ~2.5 GB.
        run: |
          uv venv
          uv pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          uv pip install -e ".[dev]"
      - name: Run unit tests
        run: .venv/bin/pytest -m "not slow" -v

  overfit-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Create venv with CPU torch
        run: |
          uv venv
          uv pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          uv pip install -e ".[dev]"
      - name: Run M0 overfit smoke test
        run: .venv/bin/pytest -m slow -v
